<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMATIONS CSS</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            background-color: burlywood;
            height: 100vh;
            width: 100vw;
            border: 5px solid black;
        }
        .box{
            width:350px;
            height: 80px;
            border:2px solid rgb(217, 255, 0);
            background-color: aqua;
            margin: 10px;
            padding: 3px;
            border-radius: 10px;
            position:relative;
            /* animation-name: rightmovement;
            animation-duration: 8s;
            animation-iteration-count:1;
            animation-delay: 1s;
            animation-timing-function:  linear; */
            /* animation-timing-function: ease-in; */
            /* animation-timing-function: ease-out; */
            /* animation-timing-function: cubic-bezier(1,-0.4,1,1); */
            /* animation-direction: alternate; */
            /* animation-direction: reverse; */
            /* animation-direction: inherit; */
            /* animation-fill-mode: forwards; */
            /* animation-fill-mode: backwards; */

            /* @keyframes duration | easing-function | delay |
            iteration-count | direction | fill-mode | play-state | name */
            animation: 3s linear 1s infinite alternate running rightmovement;

        }

        #box2{
            width:350px;
            height: 80px;
            border:2px solid rgb(217, 255, 0);
            background-color: aqua;
            margin: 10px;
            padding: 3px;
            border-radius: 10px;
            position:relative;
            animation: 3s linear 1s infinite alternate running leftmovement;
        }
        #circle{
            width:30px;
            height: 30px;
            border:2px solid black;
            background-color: rgb(4, 0, 255);
            margin: 10px;
            border-radius: 100px;
            position:relative;
            top: 35%;
            left:45%;
            animation: 10s ease-in-out 0s infinite alternate-reverse  none running circlemovement;
        }
        @keyframes rightmovement{
            from{
                top:0;
                left:0
            }
            to{
                top:0;
                left: 1050px;
            }
        }
        @keyframes leftmovement{
            from{
                top:580px;
                left: 1050px;;
            }
            to{
                top:580px;
                left:0px
            }
        }
        @keyframes circlemovement{
            0%{
                top:3%;
                left:5%
            }
            20%{
                top:5%;
                left:90%
            }
            40%{
                top:50%;
                left:10%;
            }
            60%{
                top:70%;
                left:40%;
            }
            100%{
                top:90;
                left:95;
            }


        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box">

        </div>
        <div id="circle">

        </div>
      <div id="box2">

    </div>
     </div>
</body>
</html>
